<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coletor — Loja do Mecânico</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --orange:#E8450A;--orange-dark:#C23A08;--orange-light:#2a1a10;
  --green:#6DBF3E;--green-light:#1a2a10;
  --red:#E84040;--red-light:#2a1010;
  --amber:#F0A500;--amber-light:#2a2010;
  --bg:#111;--bg2:#181818;--bg3:#202020;--bg4:#2a2a2a;
  --border:#2a2a2a;--border2:#333;
  --text:#fff;--text2:#aaa;--text3:#666;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:340px;text-align:center}
.login-logo{margin-bottom:16px}
.login-logo .icon{width:52px;height:52px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin:0 auto 10px}
.login-logo h1{font-size:17px;font-weight:700;color:var(--text)}
.login-logo h1 span{color:var(--orange)}
.login-logo p{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.login-err{font-size:12px;color:var(--red);margin-bottom:10px;display:none;padding:8px;background:var(--red-light);border-radius:var(--radius)}
.login-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;text-align:left}
.login-box input{width:100%;padding:11px 12px;border-radius:var(--radius);border:1px solid var(--border2);font-size:15px;margin-bottom:12px;text-align:center;background:var(--bg3);color:var(--text)}
.login-box input:focus{outline:none;border-color:var(--orange)}
.login-box button{width:100%;padding:12px;border-radius:var(--radius);border:none;background:var(--orange);color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.login-box button:active{background:var(--orange-dark)}

/* HEADER */
.header{background:#1a1a1a;border-bottom:1px solid var(--border);padding:10px 14px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-brand{display:flex;align-items:center;gap:8px}
.header-brand .dot{width:8px;height:8px;background:var(--orange);border-radius:50%}
.header-brand h1{font-size:13px;font-weight:700;color:var(--text)}
.header-brand h1 span{color:var(--orange)}
.header-right{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.08);border:none;border-radius:6px;color:var(--text2);padding:6px 10px;font-size:14px;cursor:pointer}
.icon-btn:active{opacity:.7}
.user-pill{font-size:10px;background:var(--orange-light);color:var(--orange);padding:5px 10px;border-radius:6px;font-weight:700;border:1px solid var(--orange-dark)}

/* PROGRESS */
.prog-wrap{height:2px;background:var(--border);margin:0 -14px}
.prog-fill{height:2px;background:var(--orange);transition:width .5s}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;gap:4px}
.stat-item{text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.stat-item.tarefas .stat-val{color:var(--amber)}

/* MAIN TABS */
.main-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.main-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:700;border:none;background:transparent;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.main-tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.badge{background:var(--amber);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px}

/* LOG FILTER */
.log-scroll{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border)}
.log-scroll::-webkit-scrollbar{display:none}
.log-chip{flex-shrink:0;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text3);transition:all .15s;text-transform:uppercase}
.log-chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* TAB CONTENT */
.tab-content{display:none}
.tab-content.active{display:block}

/* TASKS */
.tasks{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;transition:all .2s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2)}
.task-card.done{opacity:.4}
.task-card.done::before{background:var(--green)}
.task-card.flagged{border-color:var(--amber);background:#1c1800}
.task-card.flagged::before{background:var(--amber)}

.task-top{display:flex;gap:10px;align-items:flex-start}
.check-btn{width:26px;height:26px;border-radius:7px;border:2px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .2s;font-size:14px;color:transparent}
.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.check-btn:active{transform:scale(.88)}

.task-body{flex:1;min-width:0}
.task-sku{font-size:11px;color:var(--orange);font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:7px}
.task-card.done .task-name{text-decoration:line-through;color:var(--text3)}

.chips{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.chip{background:var(--bg3);border-radius:6px;padding:5px 8px}
.chip .cl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.chip .cv{font-size:12px;font-weight:500;color:var(--text2)}

.qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.qty-row .ql{font-size:11px;color:var(--text3)}
.qty-row .qv{font-size:22px;font-weight:700;color:var(--text)}

.curva-pill{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px}
.cA{background:#1a3a10;color:#6DBF3E}
.cB{background:#2a2010;color:#F0A500}
.cC{background:#2a1010;color:#E84040}

.flag-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--amber-light);color:var(--amber)}

.flag-btn{margin-top:8px;width:100%;padding:9px;border-radius:var(--radius);border:1px solid var(--amber);background:transparent;color:var(--amber);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;text-transform:uppercase;letter-spacing:.04em}
.flag-btn:active{background:var(--amber-light)}

.unflag-btn{margin-top:8px;width:100%;padding:9px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.3;color:var(--orange)}
.empty p{font-size:13px}

/* DONE SCREEN */
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.done-screen i{font-size:56px;color:var(--green)}
.done-screen h2{font-size:20px;font-weight:700}
.done-screen p{font-size:13px;color:var(--text3)}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--text);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAIS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal-box .sub{font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.4}
.local-alt{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.local-alt .lval{font-size:14px;font-weight:700;color:var(--orange)}
.local-alt .ldesc{font-size:10px;color:var(--text3);margin-top:2px}
.local-alt .lqtd{font-size:12px;color:var(--text2);text-align:right}
.local-alt .lqtd strong{display:block;font-size:18px;font-weight:700;color:var(--text)}
.modal-alert{background:var(--amber-light);border:1px solid var(--amber);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--amber);margin-bottom:14px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions button{flex:1;padding:12px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;text-transform:uppercase;letter-spacing:.04em}
.btn-confirmar{background:var(--orange);color:#fff}
.btn-confirmar:active{background:var(--orange-dark)}
.btn-cancelar{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.btn-fechar{background:var(--orange);color:#fff;width:100%;padding:12px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;text-transform:uppercase;letter-spacing:.04em}
.btn-fechar:active{background:var(--orange-dark)}
</style>
</head>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="dot"></div>
        <h1>Loja do <span>Mecânico</span></h1>
      </div>
      <div class="header-right">
        <span class="user-pill" id="user-label"></span>
        <button class="icon-btn" onclick="refresh()" title="Atualizar"><i class="ti ti-refresh"></i></button>
        <button class="icon-btn" onclick="logout()" title="Sair"><i class="ti ti-logout"></i></button>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-val" id="s-done" style="color:var(--green)">0</div><div class="stat-label">Feitos</div></div>
    <div class="stat-item"><div class="stat-val" id="s-pend" style="color:var(--amber)">0</div><div class="stat-label">Restantes</div></div>
    <div class="stat-item tarefas"><div class="stat-val" id="s-tarefas">0</div><div class="stat-label">Tarefas</div></div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="setMainTab('pendentes')"><i class="ti ti-clipboard-list"></i> Lista</button>
    <button class="main-tab" onclick="setMainTab('tarefas')"><i class="ti ti-flag"></i> Tarefas <span class="badge" id="tarefas-badge" style="display:none">0</span></button>
  </div>

  <div class="log-scroll" id="log-tabs"></div>

  <div class="tab-content active" id="tab-pendentes">
    <div class="tasks" id="tasks-container">
      <div class="empty"><i class="ti ti-loader"></i><p>Carregando...</p></div>
    </div>
  </div>

  <div class="tab-content" id="tab-tarefas">
    <div class="tasks" id="tarefas-container"></div>
  </div>
</div>

<!-- MODAL CONFIRMAÇÃO -->
<div class="modal-overlay" id="modal-confirmar">
  <div class="modal-box">
    <h3>Gerar tarefa?</h3>
    <p class="sub" id="modal-confirmar-desc"></p>
    <div class="modal-alert"><i class="ti ti-alert-triangle"></i> Use apenas quando o produto <strong>não está no local</strong> ou <strong>não há estoque disponível</strong>.</div>
    <div class="modal-actions">
      <button class="btn-cancelar" onclick="fecharModalConfirmar()">Cancelar</button>
      <button class="btn-confirmar" onclick="confirmarGerarTarefa()"><i class="ti ti-flag"></i> Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL LOCAIS ALTERNATIVOS -->
<div class="modal-overlay" id="modal-locais">
  <div class="modal-box">
    <h3>Locais alternativos</h3>
    <p class="sub" id="modal-item-desc"></p>
    <div id="modal-locais-lista"></div>
    <button class="btn-fechar" onclick="fecharModalLocais()" style="margin-top:14px"><i class="ti ti-check"></i> Entendido</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let username = null;
let grupos = [];
let activeLog = 'all';
let mainTab = 'pendentes';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function mostrarLogin() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function mostrarApp() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = username;
  carregarItens();
}

async function fazerLogin() {
  const u = document.getElementById('login-user').value.trim();
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!u) { errEl.textContent = 'Informe seu usuário'; errEl.style.display='block'; return; }
  try {
    const r = await fetch('/api/coletor/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: u }) });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.erro || 'Usuário não encontrado'; errEl.style.display='block'; return; }
    username = data.username;
    localStorage.setItem('coletor_user', username);
    mostrarApp();
  } catch (e) { errEl.textContent = 'Erro de conexão'; errEl.style.display='block'; }
}

function logout() {
  localStorage.removeItem('coletor_user');
  username = null;
  mostrarLogin();
}

document.getElementById('login-user').addEventListener('keydown', e => { if (e.key==='Enter') fazerLogin(); });

async function carregarItens() {
  if (!username) return;
  const r = await fetch('/api/coletor/itens?usuario=' + encodeURIComponent(username));
  grupos = await r.json();
  renderLogTabs();
  renderAll();
}

function todosItensFlat() { return grupos.flatMap(g => g.itens); }

function renderLogTabs() {
  const itens = todosItensFlat().filter(x => !x.tarefa_gerada);
  const logs = ['all', ...new Set(itens.map(x=>x.log).filter(Boolean))];
  document.getElementById('log-tabs').innerHTML = logs.map(l =>
    `<button class="log-chip${activeLog===l?' active':''}" onclick="setLog('${l}')">${l==='all'?'Todos':l}</button>`
  ).join('');
}

function setLog(l) { activeLog=l; renderLogTabs(); renderAll(); }

function setMainTab(tab) {
  mainTab = tab;
  document.querySelectorAll('.main-tab').forEach((b,i)=>b.classList.toggle('active',['pendentes','tarefas'][i]===tab));
  document.getElementById('tab-pendentes').classList.toggle('active', tab==='pendentes');
  document.getElementById('tab-tarefas').classList.toggle('active', tab==='tarefas');
  document.getElementById('log-tabs').style.display = tab==='pendentes'?'flex':'none';
}

function curvaClass(c) { if(c==='A') return 'cA'; if(c==='B') return 'cB'; return 'cC'; }

function renderAll() {
  const todos = todosItensFlat();
  const pendentes = todos.filter(x => !x.tarefa_gerada);
  const tarefas = todos.filter(x => x.tarefa_gerada);
  const filtro = activeLog==='all' ? pendentes : pendentes.filter(x=>x.log===activeLog);
  const done = filtro.filter(x=>x.feito).length;
  const total = filtro.length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-pend').textContent = total - done;
  document.getElementById('s-tarefas').textContent = tarefas.length;
  document.getElementById('prog').style.width = pct + '%';

  const badge = document.getElementById('tarefas-badge');
  badge.style.display = tarefas.length ? 'inline-block' : 'none';
  badge.textContent = tarefas.length;

  renderLista(filtro, done, total);
  renderTarefas(tarefas);
}

function renderLista(lista, done, total) {
  const container = document.getElementById('tasks-container');
  if (!lista.length) { container.innerHTML = '<div class="empty"><i class="ti ti-clipboard-x"></i><p>Nenhuma tarefa neste filtro.</p></div>'; return; }
  if (done === total && total > 0) {
    container.innerHTML = `<div class="done-screen"><i class="ti ti-circle-check"></i><h2>Tudo concluído!</h2><p>Todos os ${total} itens foram finalizados.</p></div>`;
    return;
  }
  const sorted = [...lista].sort((a,b) => a.feito - b.feito);
  container.innerHTML = sorted.map(x => `
    <div class="task-card${x.feito?' done':''}">
      <div class="task-top">
        <div class="check-btn${x.feito?' done':''}" onclick="toggleFeito('${x.id}',${x.feito})">
          ${x.feito?'<i class="ti ti-check"></i>':''}
        </div>
        <div class="task-body">
          <div class="task-sku">${x.sku||''} ${x.ean?'<span style="color:var(--text3)">EAN '+x.ean+'</span>':''} ${x.curva?`<span class="curva-pill ${curvaClass(x.curva)}">${x.curva}</span>`:''}</div>
          <div class="task-name">${x.descricao||'—'}</div>
          <div class="chips">
            <div class="chip"><div class="cl">Origem</div><div class="cv">${x.local_origem||'—'}</div></div>
            <div class="chip"><div class="cl">Destino</div><div class="cv">${x.local_destino&&x.local_destino!=='#N/A'?x.local_destino:'—'}</div></div>
            <div class="chip"><div class="cl">LOG</div><div class="cv">${x.log||'—'}</div></div>
            <div class="chip"><div class="cl">Resp.</div><div class="cv">${x.responsavel||'—'}</div></div>
          </div>
          <div class="qty-row"><span class="ql">Quantidade pedida</span><span class="qv">${x.qtd}</span></div>
          ${!x.feito?`<button class="flag-btn" onclick="gerarTarefa('${x.id}')"><i class="ti ti-flag"></i> Gerar tarefa (sem estoque / local errado)</button>`:''}
        </div>
      </div>
    </div>`).join('');
}

function renderTarefas(tarefas) {
  const container = document.getElementById('tarefas-container');
  if (!tarefas.length) { container.innerHTML = '<div class="empty"><i class="ti ti-flag-off"></i><p>Nenhuma tarefa gerada.</p></div>'; return; }
  container.innerHTML = tarefas.map(x => `
    <div class="task-card flagged">
      <div class="task-top">
        <div class="check-btn${x.feito?' done':''}" onclick="toggleFeito('${x.id}',${x.feito})">
          ${x.feito?'<i class="ti ti-check"></i>':''}
        </div>
        <div class="task-body">
          <div class="task-sku">${x.sku||''} ${x.curva?`<span class="curva-pill ${curvaClass(x.curva)}">${x.curva}</span>`:''} <span class="flag-pill"><i class="ti ti-flag"></i> Tarefa</span></div>
          <div class="task-name">${x.descricao||'—'}</div>
          <div class="chips">
            <div class="chip"><div class="cl">Origem</div><div class="cv">${x.local_origem||'—'}</div></div>
            <div class="chip"><div class="cl">Destino</div><div class="cv">${x.local_destino&&x.local_destino!=='#N/A'?x.local_destino:'—'}</div></div>
          </div>
          <div class="qty-row"><span class="ql">Quantidade pedida</span><span class="qv">${x.qtd}</span></div>
          <button class="unflag-btn" onclick="removerTarefa('${x.id}')"><i class="ti ti-arrow-back"></i> Voltar para a lista</button>
        </div>
      </div>
    </div>`).join('');
}

async function toggleFeito(id, atual) {
  const novo = !atual;
  await fetch('/api/itens/' + id + '/feito', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ feito: novo }) });
  const item = todosItensFlat().find(x=>x.id===id);
  if (item) item.feito = novo;
  toast(novo ? '✅ Item concluído!' : 'Item desmarcado');
  renderAll();
}

let itemParaTarefa = null;

async function gerarTarefa(id) {
  const item = todosItensFlat().find(x => x.id === id);
  if (!item) return;
  itemParaTarefa = item;
  document.getElementById('modal-confirmar-desc').textContent = `SKU ${item.sku} — ${item.descricao}`;
  document.getElementById('modal-confirmar').classList.add('open');
}

function fecharModalConfirmar() {
  document.getElementById('modal-confirmar').classList.remove('open');
  itemParaTarefa = null;
}

async function confirmarGerarTarefa() {
  if (!itemParaTarefa) return;
  const item = itemParaTarefa;
  fecharModalConfirmar();
  await _confirmarTarefa(item.id);
  try {
    const r = await fetch('/api/locais-altos/' + encodeURIComponent(item.sku));
    const locais = await r.json();
    const listaEl = document.getElementById('modal-locais-lista');
    document.getElementById('modal-item-desc').textContent = `SKU ${item.sku} — ${item.descricao}`;
    if (locais.length) {
      listaEl.innerHTML = locais.map(l => `
        <div class="local-alt">
          <div>
            <div class="lval"><i class="ti ti-map-pin"></i> ${l.local}</div>
            <div class="ldesc">${l.descricao||''}</div>
          </div>
          <div class="lqtd"><span style="font-size:9px;color:var(--text3);text-transform:uppercase">Qtd</span><strong>${l.quantidade}</strong></div>
        </div>`).join('');
    } else {
      listaEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)"><i class="ti ti-map-pin-off" style="font-size:32px;display:block;margin-bottom:8px;color:var(--orange);opacity:.4"></i>Nenhum local alternativo encontrado para este SKU.</div>';
    }
    document.getElementById('modal-locais').classList.add('open');
  } catch(e) {}
}

function fecharModalLocais() {
  document.getElementById('modal-locais').classList.remove('open');
}

async function _confirmarTarefa(id) {
  await fetch('/api/itens/' + id + '/tarefa', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tarefa_gerada: true }) });
  const item = todosItensFlat().find(x=>x.id===id);
  if (item) item.tarefa_gerada = true;
  toast('🚩 Tarefa gerada!');
  renderLogTabs();
  renderAll();
}

async function removerTarefa(id) {
  await fetch('/api/itens/' + id + '/tarefa', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ tarefa_gerada: false }) });
  const item = todosItensFlat().find(x=>x.id===id);
  if (item) item.tarefa_gerada = false;
  toast('Item voltou para a lista');
  renderLogTabs();
  renderAll();
}

async function refresh() { await carregarItens(); toast('Atualizado'); }
setInterval(carregarItens, 30000);

const savedUser = localStorage.getItem('coletor_user');
if (savedUser) { username = savedUser; mostrarApp(); } else { mostrarLogin(); }
</script>
</body>
</html>
