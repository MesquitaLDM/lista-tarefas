<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja do Mecânico — Tarefas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{max-width:380px;width:100%;padding:32px 20px;text-align:center}
.logo{margin-bottom:8px}
.logo svg{width:72px;height:72px}
.brand{font-size:22px;font-weight:800;color:#fff;margin-bottom:2px;letter-spacing:-.3px}
.brand span{color:#E8450A}
.tagline{font-size:12px;color:#666;margin-bottom:32px;text-transform:uppercase;letter-spacing:.1em}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:18px 20px;text-decoration:none;color:#fff;display:flex;align-items:center;gap:14px;transition:all .2s}
.card:hover{border-color:#E8450A;background:#1f1a17}
.icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.icon-adm{background:#2a1a10;color:#E8450A}
.icon-col{background:#1a2a10;color:#6DBF3E}
.card-text{text-align:left}
.card-title{font-size:15px;font-weight:600;margin-bottom:2px;color:#fff}
.card-sub{font-size:12px;color:#666}
.card:hover .card-title{color:#E8450A}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- carrinho com chave -->
      <g fill="#E8450A">
        <!-- chave inclinada no topo -->
        <rect x="20" y="18" width="60" height="10" rx="5" transform="rotate(-15 50 23)"/>
        <circle cx="20" cy="18" r="8" fill="none" stroke="#E8450A" stroke-width="5"/>
        <circle cx="78" cy="30" r="6" fill="none" stroke="#E8450A" stroke-width="4"/>
        <!-- corpo do carrinho -->
        <rect x="15" y="38" width="65" height="28" rx="6"/>
        <!-- rodas dentadas -->
        <circle cx="28" cy="75" r="9" fill="#E8450A"/>
        <circle cx="28" cy="75" r="5" fill="#111"/>
        <circle cx="68" cy="75" r="9" fill="#E8450A"/>
        <circle cx="68" cy="75" r="5" fill="#111"/>
      </g>
    </svg>
  </div>
  <div class="brand">Loja do <span>Mecânico</span></div>
  <div class="tagline">Lugar de quem faz</div>
  <div class="cards">
    <a href="/adm" class="card">
      <div class="icon icon-adm"><i class="ti ti-settings"></i></div>
      <div class="card-text">
        <div class="card-title">Painel ADM</div>
        <div class="card-sub">Criar, importar e publicar listas</div>
      </div>
    </a>
    <a href="/coletor" class="card">
      <div class="icon icon-col"><i class="ti ti-device-mobile"></i></div>
      <div class="card-text">
        <div class="card-title">Coletor</div>
        <div class="card-sub">Ver e executar tarefas</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
