<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tarefas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{max-width:360px;width:100%;padding:32px 20px;text-align:center}
h1{font-size:22px;font-weight:700;color:#1a1a18;margin-bottom:8px}
p{font-size:14px;color:#666560;margin-bottom:32px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:20px;text-decoration:none;color:#1a1a18;display:flex;align-items:center;gap:14px;transition:all .15s}
.card:hover{border-color:#185FA5;background:#E6F1FB}
.icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.icon-adm{background:#E6F1FB;color:#185FA5}
.icon-col{background:#EAF3DE;color:#3B6D11}
.card-text{text-align:left}
.card-title{font-size:15px;font-weight:600;margin-bottom:2px}
.card-sub{font-size:12px;color:#999890}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>
<div class="wrap">
  <h1>📋 Listas de Tarefas</h1>
  <p>Selecione o seu perfil de acesso</p>
  <div class="cards">
    <a href="/adm" class="card">
      <div class="icon icon-adm"><i class="ti ti-settings"></i></div>
      <div class="card-text">
        <div class="card-title">Painel ADM</div>
        <div class="card-sub">Criar, importar e publicar listas</div>
      </div>
    </a>
    <a href="/coletor" class="card">
      <div class="icon icon-col"><i class="ti ti-device-mobile"></i></div>
      <div class="card-text">
        <div class="card-title">Coletor</div>
        <div class="card-sub">Ver e executar tarefas</div>
      </div>
    </a>
  </div>
</div>
</body>
</html>
